<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="80%" cy="-10%" r="80%">
      <stop offset="0%" stop-color="#3b1252"/>
      <stop offset="100%" stop-color="#06030c"/>
    </radialGradient>
    <radialGradient id="bg2" cx="-10%" cy="110%" r="60%">
      <stop offset="0%" stop-color="#1a0633"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="label" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5e8a"/>
      <stop offset="100%" stop-color="#d4a24a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5e8a"/>
      <stop offset="100%" stop-color="#f9c74f"/>
    </linearGradient>
    <radialGradient id="vinylBody">
      <stop offset="0%" stop-color="#1c1226"/>
      <stop offset="100%" stop-color="#0a060f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5e8a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff5e8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- glow behind vinyl -->
  <circle cx="900" cy="315" r="320" fill="url(#glow)"/>

  <!-- vinyl record -->
  <g transform="translate(900, 315)">
    <circle r="240" fill="url(#vinylBody)"/>
    <circle r="240" fill="none" stroke="#19131f" stroke-width="1"/>
    <circle r="220" fill="none" stroke="#1a141f" stroke-width="1" opacity="0.6"/>
    <circle r="200" fill="none" stroke="#1a141f" stroke-width="1" opacity="0.6"/>
    <circle r="180" fill="none" stroke="#1a141f" stroke-width="1" opacity="0.6"/>
    <circle r="160" fill="none" stroke="#1a141f" stroke-width="1" opacity="0.6"/>
    <circle r="140" fill="none" stroke="#1a141f" stroke-width="1" opacity="0.6"/>
    <circle r="120" fill="none" stroke="#1a141f" stroke-width="1" opacity="0.6"/>
    <!-- shine -->
    <path d="M -240 0 A 240 240 0 0 1 0 -240" stroke="rgba(255,255,255,0.06)" stroke-width="40" fill="none"/>
    <!-- label -->
    <circle r="92" fill="url(#label)"/>
    <circle r="92" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="6"/>
    <!-- center hole -->
    <circle r="6" fill="#06030a"/>
  </g>

  <!-- text -->
  <g transform="translate(80, 180)">
    <text font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-size="20" font-weight="700" letter-spacing="6"
          fill="rgba(255,255,255,0.6)">SPIN — VINYL MUSIC PLAYER</text>

    <text y="120" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-size="124" font-weight="900" letter-spacing="-3"
          fill="#ffffff">Drop the</text>
    <text y="240" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-size="124" font-weight="900" letter-spacing="-3" font-style="italic"
          fill="url(#accent)">needle.</text>

    <text y="320" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-size="22" font-weight="500"
          fill="rgba(255,255,255,0.7)">A PWA music player with album-aware theming,</text>
    <text y="350" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-size="22" font-weight="500"
          fill="rgba(255,255,255,0.7)">live audio visualizer, lyrics, and full playback.</text>

    <g transform="translate(0, 400)">
      <rect width="240" height="44" rx="22" fill="url(#accent)"/>
      <text x="28" y="29" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
            font-size="16" font-weight="700" fill="#0a0610">▶  PLAY THE DEMO</text>
    </g>
  </g>
</svg>
